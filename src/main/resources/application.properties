# Server Configuration
server.address=0.0.0.0
server.port=8080
server.servlet.context-path=/
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=2048

# Spring Application Name
spring.application.name=clucknet-backend

# Relational Database Configuration (MySQL)
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/clucknet_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:rN$77_18}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hikari Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:20}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:5}
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.pool-name=CluckNetHikariCP

# JPA & Hibernate Settings
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=false
spring.jpa.properties.hibernate.jdbc.batch_size=30
spring.jpa.properties.hibernate.jdbc.order_inserts=true
spring.jpa.properties.hibernate.jdbc.order_updates=true
spring.jpa.properties.hibernate.type.descriptor.sql.bind.to.log.level=TRACE

# InfluxDB 2.x Configuration for Time-Series Telemetry
influxdb.url=${INFLUXDB_URL:http://localhost:8086}
influxdb.token=${INFLUXDB_TOKEN:qumhHO5icmhC9qpApu3JdUThjxMX-J3IKwYhyXFgaa2jTfuhrCHzRqaCGJJfcLgd27zyhdWcEt930_oVkEsRsg==}
influxdb.org=${INFLUXDB_ORG:group18}
influxdb.bucket=${INFLUXDB_BUCKET:clucknet_db}
influxdb.retention-days=${INFLUXDB_RETENTION_DAYS:30}

# AWS IoT Core MQTT Configuration
aws.iot.mqtt.broker-url=${AWS_IOT_BROKER_URL:ssl://a17exdzqte0iob-ats.iot.eu-north-1.amazonaws.com:8883}
aws.iot.mqtt.client-id=${AWS_IOT_CLIENT_ID:clucknet-backend-service}
aws.iot.mqtt.connection-timeout-seconds=30
aws.iot.mqtt.keep-alive-interval-seconds=60
aws.iot.mqtt.clean-session=true

# Certificate-based TLS Mutual Authentication Parameters
aws.iot.mqtt.ssl.enabled=${AWS_IOT_SSL_ENABLED:true}
aws.iot.mqtt.ssl.key-store-path=${AWS_IOT_KEYSTORE_PATH:src/main/resources/certs/device.p12}
aws.iot.mqtt.ssl.key-store-password=${AWS_IOT_KEYSTORE_PASSWORD:clucknet123}
aws.iot.mqtt.ssl.trust-store-path=${AWS_IOT_TRUSTSTORE_PATH:src/main/resources/certs/truststore.jks}
aws.iot.mqtt.ssl.trust-store-password=${AWS_IOT_TRUSTSTORE_PASSWORD:clucknet123}

# IoT Topics Design
aws.iot.mqtt.topics.telemetry=${MQTT_TOPIC_TELEMETRY:clucknet/zones/{zoneId}/telemetry}
aws.iot.mqtt.topics.alerts=${MQTT_TOPIC_ALERTS:clucknet/zones/{zoneId}/alerts}
aws.iot.mqtt.topics.threshold-sync=${MQTT_TOPIC_SYNC_PREFIX:clucknet/zones/{zoneId}/thresholds}

# JWT Cryptographic Configuration
jwt.secret=${JWT_SECRET_KEY:d2VsbC1jb21wb3NlZC1zZWNyZXQta2V5LXRoYXQtbXVzdC1iZS1hdC1sZWFzdC1maWZ0eS1jaGFyYWN0ZXJzLWxvbmc=}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
springdoc.api-docs.path=/v3/api-docs

# Application Log Settings
logging.level.root=INFO
logging.level.com.clucknet.backend=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n